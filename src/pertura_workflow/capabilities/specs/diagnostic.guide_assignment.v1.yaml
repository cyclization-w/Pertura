schema_version: pertura-capability-spec-v2
capability_id: diagnostic.guide_assignment.v1
version: 1.0.0
phase: 2
kind: diagnostic
summary: Check barcode overlap, guide-map integrity, orientation, assignment posterior,
  ambient guides and MOI.
trust_level: builtin_trusted
executor: guide_assignment_qc
validator: standard
input_requirements:
- dataset_contract
- guide_matrix
depends_on: []
dependency_kinds:
- contract
output_kind: guide_assignment_qc
source_class: measured_result
claim_permissions: []
timeout_seconds: 900
parameters_schema:
  type: object
  properties:
    balance_columns:
      type: array
      items:
        type: string
    barcode_column:
      type: string
    chunk_rows:
      type: integer
      minimum: 1
    design_moi:
      type: string
      enum:
      - low
      - high
      - unknown
    doublet_score_column:
      type: string
    doublet_threshold:
      type: number
    guide_counts_path:
      type: string
      description: Registered asset ID with role guide_matrix.
      x-pertura-asset-role: guide_matrix
    guide_map_path:
      type: string
      description: Registered asset ID with role guide_map.
      x-pertura-asset-role: guide_map
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    metadata_barcode_column:
      type: string
    metadata_path:
      type: string
      description: Registered asset ID with role cell_metadata.
      x-pertura-asset-role: cell_metadata
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    posterior_threshold:
      type: number
    raw_guide_counts_path:
      type: string
      description: Registered asset ID with role guide_matrix.
      x-pertura-asset-role: guide_matrix
    rna_barcode_column:
      type: string
    rna_barcodes_path:
      type: string
      description: Registered asset ID with role rna_barcodes.
      x-pertura-asset-role: rna_barcodes
  required: []
  additionalProperties: false
  examples:
  - max_memory_gb: 4.0
implemented: true
metadata:
  deprecated: true
  compatibility_only: true
  provides_dependency_kinds:
  - retained_cell_manifest
