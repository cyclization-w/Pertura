schema_version: pertura-capability-spec-v2
capability_id: guide.assignment.nb_mixture.v1
version: 0.1.0
phase: 2
kind: diagnostic
summary: Assign guides with deterministic two-component negative-binomial mixtures.
trust_level: exploratory
executor: guide_nb_mixture
validator: candidate_standard
input_requirements:
- guide_matrix
depends_on:
- guide.integrity.v1
dependency_kinds:
- contract
- guide_integrity
output_kind: guide_assignment
source_class: measured_result
claim_permissions: []
timeout_seconds: 1800
parameters_schema:
  type: object
  properties:
    barcode_column:
      type: string
    chunk_rows:
      type: integer
      minimum: 1
    column_manifest_path:
      type: string
      description: Registered asset ID with role guide_matrix_manifest.
      x-pertura-asset-role: guide_matrix_manifest
    guide_counts_path:
      type: string
      description: Registered asset ID with role guide_matrix.
      x-pertura-asset-role: guide_matrix
    layer:
      type: string
    max_iterations:
      type: integer
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    modality:
      type: string
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    posterior_threshold:
      type: number
    row_manifest_path:
      type: string
      description: Registered asset ID with role guide_matrix_manifest.
      x-pertura-asset-role: guide_matrix_manifest
    tolerance:
      type: number
  required:
  - guide_counts_path
  additionalProperties: false
  examples:
  - guide_counts_path: asset_example_guide_matrix
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  dependency_policy:
    guide.integrity.v1:
      scope: exact
      usage: validation_gate
      accepted_statuses:
      - screen_passed
      - caution
