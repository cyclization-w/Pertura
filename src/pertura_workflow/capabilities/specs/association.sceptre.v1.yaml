    assignment_method:
      type: string
    batch_column:
      type: string
    calibration_group_size:
      type: number
    calibration_type1_threshold:
      type: number
    chunk_rows:
      type: integer
    condition_column:
      type: string
    contrast:
      type: array
      items:
        type:
        - string
        - number
        - integer
        - object
    effect_table_path:
      type: string
    grna_integration_strategy:
      type: number
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    maximum_type1_rate:
      type: string
    metadata_path:
      type: string
      x-pertura-asset-role: cell_metadata
      description: Registered asset ID with role cell_metadata.
    method:
      type: string
    moi:
      type: string
    multiple_testing_alpha:
      type: number
    n_calibration_pairs:
      type: integer
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    null_results_path:
      type: string
    permutation_unit:
      type: string
    sample_column:
      type: string
    side:
      type: string
    state_column:
      type: string
    timeout_seconds:
      type: integer
  additionalProperties: false
  examples:
  - {}
implemented: true
