schema_version: pertura-capability-spec-v2
capability_id: association.sceptre.v1
version: 0.1.0
phase: 5
kind: analysis
summary: Run calibrated high-MOI guide-response association with SCEPTRE.
trust_level: exploratory
executor: sceptre_association
validator: candidate_standard
input_requirements:
- high_moi_counts
- guide_map
- discovery_pairs
depends_on:
- screen.retained_cells.v1
- diagnostic.design_balance.v1
dependency_kinds:
- contract
- retained_cell_manifest
- design_balance
output_kind: conditional_association
source_class: measured_result
claim_permissions: []
timeout_seconds: 7200
parameters_schema:
  type: object
  properties:
    assignment_method:
      type: string
    calibration_group_size:
      type: integer
      minimum: 1
    calibration_type1_threshold:
      type: number
    cell_ids_path:
      type: string
      description: Registered asset ID with role cell_ids.
      x-pertura-asset-role: cell_ids
    chunk_rows:
      type: integer
      minimum: 1
    covariates_path:
      type: string
      description: Registered asset ID with role cell_metadata.
      x-pertura-asset-role: cell_metadata
    discovery_pairs_path:
      type: string
      description: Registered asset ID with role discovery_pairs.
      x-pertura-asset-role: discovery_pairs
    grna_integration_strategy:
      type: string
    guide_ids_path:
      type: string
      description: Registered asset ID with role guide_ids.
      x-pertura-asset-role: guide_ids
    guide_matrix_path:
      type: string
      description: Registered asset ID with role guide_matrix.
      x-pertura-asset-role: guide_matrix
    guide_target_map_path:
      type: string
      description: Registered asset ID with role guide_map.
      x-pertura-asset-role: guide_map
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    moi:
      type: string
      enum:
      - high
    multiple_testing_alpha:
      type: number
    n_calibration_pairs:
      type: integer
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    response_ids_path:
      type: string
      description: Registered asset ID with role response_ids.
      x-pertura-asset-role: response_ids
    response_matrix_path:
      type: string
      description: Registered asset ID with role response_matrix.
      x-pertura-asset-role: response_matrix
    side:
      type: string
      enum:
      - both
      - left
      - right
    timeout_seconds:
      type: integer
  required:
  - response_matrix_path
  - guide_matrix_path
  - guide_target_map_path
  - discovery_pairs_path
  additionalProperties: false
  examples:
  - response_matrix_path: asset_example_response_matrix
    guide_matrix_path: asset_example_guide_matrix
    guide_target_map_path: asset_example_guide_map
    discovery_pairs_path: asset_example_discovery_pairs
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  environment_profile: sceptre-v1
  method_version: sceptre-0.99.0
  dependency_policy:
    screen.retained_cells.v1:
      scope: exact
      usage: row_filter
      accepted_statuses: &id001
      - screen_passed
      - caution
    diagnostic.design_balance.v1:
      scope: exact
      usage: validation_gate
      accepted_statuses: *id001
