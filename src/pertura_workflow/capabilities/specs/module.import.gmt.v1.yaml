schema_version: pertura-capability-spec-v2
capability_id: module.import.gmt.v1
version: 1.0.0
phase: 3
kind: analysis
summary: Import versioned GMT modules with species, namespace, duplicate and coverage
  validation.
trust_level: builtin_trusted
executor: gmt_import
validator: standard
input_requirements:
- dataset_contract
- gmt
dependency_kinds:
- contract
output_kind: module_reference
source_class: curated_prior
claim_permissions:
- curated_module_definition
timeout_seconds: 120
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    gene_universe:
      type: array
      items:
        type: string
    gmt_path:
      type: string
      description: Registered asset ID with role gene_modules.
      x-pertura-asset-role: gene_modules
    identifier_namespace:
      type: string
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    species:
      type: string
  required:
  - gmt_path
  - species
  - identifier_namespace
  additionalProperties: false
  examples:
  - gmt_path: asset_example_gene_modules
    species: example
    identifier_namespace: example
implemented: true
