schema_version: pertura-capability-spec-v2
capability_id: module.import.gmt.v1
version: 1.0.0
phase: 3
kind: analysis
summary: Import versioned GMT modules with species, namespace, duplicate and coverage
  validation.
trust_level: builtin_trusted
executor: gmt_import
validator: standard
input_requirements:
- dataset_contract
- gmt
dependency_kinds:
- contract
output_kind: module_reference
source_class: curated_prior
claim_permissions:
- curated_module_definition
timeout_seconds: 120
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
    control_column:
      type: string
    control_values:
      type: array
      items:
        type:
        - string
        - number
        - integer
        - object
    gene_universe:
      type: array
      items:
        type:
        - string
        - number
        - integer
        - object
    gmt_path:
      type: string
      x-pertura-asset-role: gene_modules
      description: Registered asset ID with role gene_modules.
    h5ad_path:
      type: string
      x-pertura-asset-role: primary_dataset
      description: Registered asset ID with role primary_dataset.
    identifier_namespace:
      type: string
    max_memory_gb:
      type: integer
    n_jobs:
      type: integer
    ranks:
      type: array
      items:
        type:
        - string
        - number
        - integer
        - object
    seeds:
      type: array
      items:
        type:
        - string
        - number
        - integer
        - object
    species:
      type: string
  additionalProperties: false
  examples:
  - {}
  required:
  - gmt_path
  - species
  - identifier_namespace
implemented: true
