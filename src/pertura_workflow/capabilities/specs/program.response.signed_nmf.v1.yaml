schema_version: pertura-capability-spec-v2
capability_id: program.response.signed_nmf.v1
version: 0.1.0
phase: 6
kind: analysis
summary: Learn signed response programs from a committed effect matrix across ranks
  and seeds.
trust_level: exploratory
executor: response_signed_nmf
validator: candidate_standard
input_requirements:
- effect_matrix
depends_on:
- effect.matrix.assemble.v1
dependency_kinds:
- effect_matrix
output_kind: response_programs
source_class: measured_result
claim_permissions: []
timeout_seconds: 3600
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    max_iter:
      type: integer
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    minimum_feature_coverage:
      type: number
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    n_seeds:
      type: integer
    ranks:
      type: array
      items:
        type: integer
    seed:
      type: integer
    stability_threshold:
      type: number
  required: []
  additionalProperties: false
  examples:
  - max_memory_gb: 4.0
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  derived_only: true
  environment_profile: interpretation-v1
  execution_mode: isolated_python
  module_namespace: response_program
  dependency_policy:
    effect.matrix.assemble.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses:
      - completed
      - completed_with_caution
