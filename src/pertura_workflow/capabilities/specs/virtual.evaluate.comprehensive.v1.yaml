schema_version: pertura-capability-spec-v2
capability_id: virtual.evaluate.comprehensive.v1
version: 0.1.0
phase: 7
kind: virtual
summary: Evaluate direction, rank, discriminability, magnitude, variance, collapse,
  uncertainty and baseline wins.
trust_level: exploratory
executor: virtual_evaluate_comprehensive
validator: candidate_standard
input_requirements:
- prediction_bundle
- split_contract
- leakage_audit
- mandatory_baselines
depends_on:
- virtual.prediction.ingest.v1
- virtual.split.contract.v1
- virtual.leakage.audit.v1
- virtual.baselines.v1
dependency_kinds:
- prediction_bundle
- virtual_split_contract
- virtual_leakage_audit
- virtual_baselines
output_kind: virtual_evaluation
source_class: prediction
claim_permissions: []
timeout_seconds: 3600
parameters_schema:
  type: object
  properties:
    bootstrap_iterations:
      type: integer
    chunk_rows:
      type: integer
      minimum: 1
    collapse_distance_ratio_min:
      type: string
    collapse_variance_ratio_min:
      type: string
    coverage_tolerance:
      type: number
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    minimum_features:
      type: integer
    minimum_units:
      type: integer
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    nominal_coverage:
      type: number
    seed:
      type: integer
  required: []
  additionalProperties: false
  examples:
  - max_memory_gb: 4.0
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  environment_profile: virtual-eval-v1
  execution_mode: isolated_python
  supersedes_placeholder: virtual.evaluate.v1
  mandatory_baselines:
  - control_mean
  - context_mean
  - linear_additive
  dependency_policy:
    virtual.prediction.ingest.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses: &id001
      - completed
      - completed_with_caution
    virtual.split.contract.v1:
      scope: exact
      usage: parameter_source
      accepted_statuses: *id001
    virtual.leakage.audit.v1:
      scope: exact
      usage: validation_gate
      accepted_statuses: &id002
      - supported
      - limited
    virtual.baselines.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses: *id002
