schema_version: pertura-capability-spec-v2
capability_id: virtual.prediction.ingest.v1
version: 0.1.0
phase: 7
kind: analysis
summary: Ingest a provider-neutral H5AD, NPZ matrix bundle or long Parquet prediction
  contract.
trust_level: exploratory
executor: virtual_prediction_ingest
validator: candidate_standard
input_requirements:
- prediction_bundle
- split_contract
depends_on:
- virtual.split.contract.v1
dependency_kinds:
- virtual_split_contract
output_kind: prediction_bundle
source_class: prediction
claim_permissions: []
timeout_seconds: 1800
parameters_schema:
  type: object
  properties:
    axis_columns:
      type: array
      items:
        type: string
    chunk_rows:
      type: integer
      minimum: 1
    format:
      type: string
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    model_id:
      type: string
    model_training_ids:
      type: array
      items:
        type: string
    model_version:
      type: string
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    observed_layer:
      type: string
    prediction_layer:
      type: string
    prediction_path:
      type: string
      description: Registered asset ID with role prediction_bundle.
      x-pertura-asset-role: prediction_bundle
    prediction_scale:
      type: string
  required:
  - prediction_path
  additionalProperties: false
  examples:
  - prediction_path: asset_example_prediction_bundle
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  environment_profile: virtual-eval-v1
  execution_mode: isolated_python
  supported_formats:
  - h5ad
  - matrix_bundle
  - long_parquet
  dependency_policy:
    virtual.split.contract.v1:
      scope: exact
      usage: parameter_source
      accepted_statuses:
      - completed
      - completed_with_caution
