schema_version: pertura-capability-spec-v2
capability_id: enrichment.ora.v1
version: 0.1.0
phase: 6
kind: analysis
summary: Run direction-aware over-representation analysis against an explicit tested-gene
  universe.
trust_level: exploratory
executor: enrichment_ora
validator: candidate_standard
input_requirements:
- effect_matrix
- gene_sets
depends_on:
- effect.matrix.assemble.v1
dependency_kinds:
- effect_matrix
output_kind: pathway_enrichment_ora
source_class: measured_result
claim_permissions: []
timeout_seconds: 1800
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    effect_threshold:
      type: number
    max_gene_set_size:
      type: integer
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    min_gene_set_size:
      type: integer
    n_jobs:
      type: integer
      default: 1
      minimum: 1
  required: []
  additionalProperties: false
  examples:
  - max_memory_gb: 4.0
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  derived_only: true
  environment_profile: interpretation-v1
  execution_mode: isolated_python
  resource_profile: pathway-knowledge-v1
  optional_result_kinds:
  - reference_modules
  dependency_policy:
    effect.matrix.assemble.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses:
      - completed
      - completed_with_caution
