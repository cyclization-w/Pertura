schema_version: pertura-capability-spec-v2
capability_id: guide.ambient.v1
version: 0.1.0
phase: 2
kind: diagnostic
summary: Estimate ambient guide background from non-cell droplets.
trust_level: exploratory
executor: guide_ambient
validator: candidate_standard
input_requirements:
- raw_guide_matrix
depends_on:
- guide.integrity.v1
dependency_kinds:
