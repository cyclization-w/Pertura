schema_version: pertura-capability-spec-v2
capability_id: guide.integrity.v1
version: 0.1.0
phase: 2
kind: diagnostic
summary: Check guide barcodes, orientation and guide-target mapping.
trust_level: exploratory
executor: guide_integrity
validator: candidate_standard
input_requirements:
- guide_matrix
- rna_barcodes
- guide_map
depends_on:
- diagnostic.dataset_integrity.v1
dependency_kinds:
- contract
output_kind: guide_integrity
source_class: observed_metadata
claim_permissions: []
timeout_seconds: 900
parameters_schema:
  type: object
  properties:
    barcode_column:
      type: string
    chunk_rows:
      type: integer
      minimum: 1
    column_manifest_path:
      type: string
      description: Registered asset ID with role guide_matrix_manifest.
      x-pertura-asset-role: guide_matrix_manifest
    guide_counts_path:
      type: string
      description: Registered asset ID with role guide_matrix.
      x-pertura-asset-role: guide_matrix
    guide_map_path:
      type: string
      description: Registered asset ID with role guide_map.
      x-pertura-asset-role: guide_map
    layer:
      type: string
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    modality:
      type: string
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    rna_barcode_column:
      type: string
    rna_barcodes_path:
      type: string
      description: Registered asset ID with role rna_barcodes.
      x-pertura-asset-role: rna_barcodes
    row_manifest_path:
      type: string
      description: Registered asset ID with role guide_matrix_manifest.
      x-pertura-asset-role: guide_matrix_manifest
  required:
  - guide_counts_path
  - rna_barcodes_path
  - guide_map_path
  additionalProperties: false
  examples:
  - guide_counts_path: asset_example_guide_matrix
    rna_barcodes_path: asset_example_rna_barcodes
    guide_map_path: asset_example_guide_map
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  dependency_policy:
    diagnostic.dataset_integrity.v1:
      scope: exact
      usage: validation_gate
      accepted_statuses:
      - screen_passed
      - caution
