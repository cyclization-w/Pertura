source_class: measured_result
claim_permissions: []
timeout_seconds: 900
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    n_jobs:
      type: integer
      default: 1
      minimum: 1
  required: []
  additionalProperties: false
  examples:
  - max_memory_gb: 4.0
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  dependency_policy:
    screen.retained_cells.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses: &id001
      - screen_passed
      - caution
    diagnostic.design_balance.v1:
      scope: exact
      usage: validation_gate
      accepted_statuses: *id001
    target.guide_efficacy.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses: *id001
    target.responder.mixscape.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses: *id001
