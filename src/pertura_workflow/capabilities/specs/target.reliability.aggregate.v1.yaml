schema_version: pertura-capability-spec-v2
capability_id: target.reliability.aggregate.v1
version: 0.1.0
phase: 4
kind: diagnostic
summary: Aggregate explicit committed reliability dependencies without raw recomputation.
trust_level: exploratory
executor: target_reliability_aggregate
validator: candidate_standard
input_requirements:
- retained_cells
- design_balance
- guide_efficacy
- mixscape
