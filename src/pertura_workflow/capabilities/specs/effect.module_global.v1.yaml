schema_version: pertura-capability-spec-v2
capability_id: effect.module_global.v1
version: 0.1.0
phase: 5
kind: analysis
summary: Derive per-perturbation module and global summaries from a committed effect
  matrix.
trust_level: exploratory
executor: module_global_effect
validator: candidate_standard
input_requirements:
- effect_matrix
- reference_modules
depends_on:
- module.import.gmt.v1
dependency_kinds:
- module_reference
output_kind: module_global_effect
source_class: measured_result
claim_permissions: []
timeout_seconds: 900
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    n_jobs:
      type: integer
      default: 1
      minimum: 1
  required: []
  additionalProperties: false
  examples:
  - max_memory_gb: 4.0
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  derived_only: true
  dependency_policy:
    module.import.gmt.v1:
      scope: dataset
      usage: scientific_input
      accepted_statuses:
      - completed
      - completed_with_caution
  dependency_sets:
  - name: effect_matrix
    result_kinds:
    - effect_matrix
    source_classes:
    - measured_result
    accepted_statuses:
    - completed
    - completed_with_caution
    scope_rule: same_dataset_context
    min_count: 1
    max_count: 1
    selection: all_compatible
