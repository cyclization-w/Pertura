schema_version: pertura-capability-spec-v2
capability_id: target.guide_efficacy.v1
version: 0.1.0
phase: 4
kind: diagnostic
summary: Evaluate target detectability, direction, guide heterogeneity and sensitivity.
trust_level: exploratory
executor: guide_efficacy
validator: candidate_standard
input_requirements:
- retained_cells
- design_balance
depends_on:
- screen.retained_cells.v1
- diagnostic.design_balance.v1
dependency_kinds:
- contract
- retained_cell_manifest
- design_balance
output_kind: target_guide_efficacy
source_class: measured_result
claim_permissions: []
timeout_seconds: 1800
parameters_schema:
  type: object
  properties:
    batch_column:
      type: string
    bootstrap_iterations:
      type: integer
    cell_column:
      type: string
    chunk_rows:
      type: integer
      minimum: 1
    condition_column:
      type: string
    control_uid:
      type: string
    expected_direction:
      type: string
      enum:
      - down
      - up
    expression_path:
      type: string
      description: Registered asset ID with role primary_dataset.
      x-pertura-asset-role: primary_dataset
    guide_bootstrap_iterations:
      type: integer
    guide_column:
      type: string
    layer_scale:
      type: string
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    metadata_path:
      type: string
      description: Registered asset ID with role cell_metadata.
      x-pertura-asset-role: cell_metadata
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    profile:
      type: string
    replicate_column:
      type: string
    signature_genes:
      type: array
      items:
        type: string
    signature_learned_from_same_perturbation:
      type: boolean
    signature_test_split_used:
      type: boolean
    target_gene:
      type: string
    target_uid:
      type: string
  required:
  - expression_path
  - metadata_path
  - target_uid
  - control_uid
  - target_gene
  - expected_direction
  additionalProperties: false
  examples:
  - expression_path: asset_example_primary_dataset
    metadata_path: asset_example_cell_metadata
    target_uid: example
    control_uid: example
    target_gene: example
    expected_direction: down
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  dependency_policy:
    screen.retained_cells.v1:
      scope: exact
      usage: row_filter
      accepted_statuses: &id001
      - screen_passed
      - caution
    diagnostic.design_balance.v1:
      scope: exact
      usage: validation_gate
      accepted_statuses: *id001
