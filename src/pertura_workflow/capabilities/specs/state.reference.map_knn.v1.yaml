schema_version: pertura-capability-spec-v2
capability_id: state.reference.map_knn.v1
version: 0.1.0
phase: 3
kind: analysis
summary: Map cells into a frozen control-derived PCA and kNN reference.
trust_level: exploratory
executor: state_reference_map
validator: candidate_standard
input_requirements:
- state_reference
depends_on:
- state.reference.fit.v1
dependency_kinds:
- contract
- state_reference
output_kind: state_mapping
source_class: measured_result
claim_permissions: []
timeout_seconds: 3600
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    h5ad_path:
      type: string
      description: Registered asset ID with role primary_dataset.
      x-pertura-asset-role: primary_dataset
    mapping_probability_threshold:
      type: number
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    reference_model_path:
      type: string
      description: Registered asset ID with role capability_artifact.
      x-pertura-asset-role: capability_artifact
    selection_path:
      type: string
      description: Registered cell-selection asset limiting held-out mapping rows.
      x-pertura-asset-role: cell_selection
  required:
  - h5ad_path
  - selection_path
  additionalProperties: false
  examples:
  - h5ad_path: asset_example_primary_dataset
    selection_path: asset_example_cell_selection
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  environment_profile: python-science-v1
  execution_mode: isolated_python
  method_version: ref03-knn-map-v1
  dependency_policy:
    state.reference.fit.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses:
      - completed
      - completed_with_caution
