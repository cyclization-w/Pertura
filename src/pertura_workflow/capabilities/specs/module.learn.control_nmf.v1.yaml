schema_version: pertura-capability-spec-v2
capability_id: module.learn.control_nmf.v1
version: 0.1.0
phase: 3
kind: analysis
summary: Learn stable NMF reference modules from confirmed control cells only.
trust_level: exploratory
executor: control_nmf
validator: candidate_standard
input_requirements:
- confirmed_controls
- retained_cells
depends_on:
- state.reference.fit.v1
- screen.retained_cells.v1
dependency_kinds:
- contract
- state_reference
- retained_cell_manifest
output_kind: reference_modules
source_class: measured_result
claim_permissions: []
timeout_seconds: 3600
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    control_column:
      type: string
    control_values:
      type: array
      items:
        type: string
    h5ad_path:
      type: string
      description: Registered asset ID with role primary_dataset.
      x-pertura-asset-role: primary_dataset
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    perturbation_labels_used:
      type: boolean
    ranks:
      type: array
      items:
        type: integer
    reference_model_path:
      type: string
      description: Registered asset ID with role capability_artifact.
      x-pertura-asset-role: capability_artifact
    seeds:
      type: array
      items:
        type: integer
    test_split_used:
      type: boolean
  required:
  - h5ad_path
  - control_column
  - control_values
  additionalProperties: false
  examples:
  - h5ad_path: asset_example_primary_dataset
    control_column: example
    control_values:
    - example
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  environment_profile: python-science-v1
  execution_mode: isolated_python
  dependency_policy:
    state.reference.fit.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses:
      - completed
      - completed_with_caution
    screen.retained_cells.v1:
      scope: exact
      usage: row_filter
      accepted_statuses:
      - screen_passed
      - caution
