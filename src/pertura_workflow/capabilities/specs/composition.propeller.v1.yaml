schema_version: pertura-capability-spec-v2
capability_id: composition.propeller.v1
version: 0.1.0
phase: 5
kind: analysis
summary: Run replicate-aware cell-state composition analysis with Propeller.
trust_level: exploratory
executor: propeller_composition
validator: candidate_standard
input_requirements:
- design_balance
depends_on:
- diagnostic.design_balance.v1
dependency_kinds:
- contract
- design_balance
output_kind: composition_effect
source_class: measured_result
claim_permissions: []
timeout_seconds: 3600
parameters_schema:
  type: object
  properties:
    batch_column:
      type: string
    chunk_rows:
      type: integer
      minimum: 1
    condition_column:
      type: string
    contrast:
      type: array
      items:
        type:
        - string
        - number
        - integer
        - object
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    metadata_path:
      type: string
      description: Registered asset ID with role cell_metadata.
      x-pertura-asset-role: cell_metadata
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    pairing_column:
      type: string
    sample_column:
      type: string
    state_column:
      type: string
    timeout_seconds:
      type: integer
  required:
  - metadata_path
  additionalProperties: false
  examples:
  - metadata_path: asset_example_cell_metadata
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  environment_profile: composition-v1
  method_version: speckle-1.10.0
  dependency_policy:
    diagnostic.design_balance.v1:
      scope: exact
      usage: validation_gate
      accepted_statuses:
      - screen_passed
      - caution
