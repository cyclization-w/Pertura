schema_version: pertura-capability-spec-v2
capability_id: virtual.baselines.v1
version: 0.1.0
phase: 7
kind: virtual
summary: Compute mandatory control-mean, context-mean and linear-additive prediction
  baselines.
trust_level: exploratory
executor: virtual_baselines
validator: candidate_standard
input_requirements:
- split_contract
- prediction_bundle
- leakage_audit
depends_on:
- virtual.split.contract.v1
- virtual.prediction.ingest.v1
- virtual.leakage.audit.v1
dependency_kinds:
- virtual_split_contract
- prediction_bundle
- virtual_leakage_audit
output_kind: virtual_baselines
source_class: prediction
claim_permissions: []
timeout_seconds: 1800
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    control_ids:
      type: array
      items:
        type: string
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    n_jobs:
      type: integer
      default: 1
      minimum: 1
  required: []
  additionalProperties: false
  examples:
  - max_memory_gb: 4.0
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  environment_profile: virtual-eval-v1
  execution_mode: isolated_python
  dependency_policy:
    virtual.split.contract.v1:
      scope: exact
      usage: parameter_source
      accepted_statuses: &id001
      - completed
      - completed_with_caution
    virtual.prediction.ingest.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses: *id001
    virtual.leakage.audit.v1:
      scope: exact
      usage: validation_gate
      accepted_statuses:
      - supported
      - limited
