schema_version: pertura-capability-spec-v2
capability_id: effect.matrix.assemble.v1
version: 0.1.0
phase: 6
kind: analysis
summary: Assemble committed gene-level effects into a signed matrix without zero-filling
  missing results.
trust_level: exploratory
executor: effect_matrix_assemble
validator: candidate_standard
input_requirements:
- gene_effect_results_or_validated_effect_tables
depends_on: []
dependency_kinds: []
output_kind: effect_matrix
source_class: measured_result
claim_permissions: []
timeout_seconds: 900
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    min_features:
      type: integer
    min_perturbations:
      type: integer
    missing_fraction_caution:
      type: number
      minimum: 0
      maximum: 1
    effect_table_paths:
      type: array
      minItems: 1
      items:
        type: string
      description: Registered artifact asset IDs containing signed gene-level effects.
      x-pertura-asset-role: effect_table
    effect_scale:
      type: string
      enum:
      - log2_fold_change
      - logFC
      - log2FC
    estimand:
      type: string
    n_jobs:
      type: integer
      default: 1
      minimum: 1
  required: []
  additionalProperties: false
  examples:
  - max_memory_gb: 4.0
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  derived_only: true
