schema_version: pertura-capability-spec-v2
capability_id: intake.materialize.v1
version: 0.1.0
phase: 1
kind: analysis
summary: Materialize a bounded sparse internal dataset bundle.
trust_level: exploratory
executor: intake_materialize
validator: candidate_standard
input_requirements:
- dataset_contract
depends_on: []
dependency_kinds:
- contract
output_kind: materialized_dataset
source_class: observed_metadata
claim_permissions: []
timeout_seconds: 1800
parameters_schema:
  type: object
  properties:
    cell_column:
      type: string
    chunk_rows:
      type: integer
      minimum: 1
    guide_barcode_column:
      type: string
    guide_column_manifest_path:
      type: string
      description: Registered asset ID with role guide_matrix_manifest.
      x-pertura-asset-role: guide_matrix_manifest
    guide_counts_path:
      type: string
      description: Registered asset ID with role guide_matrix.
      x-pertura-asset-role: guide_matrix
    guide_layer:
      type: string
    guide_modality:
      type: string
    guide_row_manifest_path:
      type: string
      description: Registered asset ID with role guide_matrix_manifest.
      x-pertura-asset-role: guide_matrix_manifest
    input_path:
      type: string
      description: Registered asset ID with role primary_dataset.
      x-pertura-asset-role: primary_dataset
    layer:
      type: string
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    modality:
      type: string
    n_jobs:
      type: integer
      default: 1
      minimum: 1
  required: []
  additionalProperties: false
  examples:
  - max_memory_gb: 4.0
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
