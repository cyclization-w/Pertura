schema_version: pertura-capability-spec-v2
capability_id: module.learn.nmf.v1
version: 1.0.0
phase: 3
kind: analysis
summary: Learn consensus-stable NMF modules from confirmed control cells.
trust_level: builtin_trusted
executor: nmf_modules
validator: standard
input_requirements:
- dataset_contract
- confirmed_controls
- retained_cells
depends_on:
- diagnostic.guide_assignment.v1
dependency_kinds:
- contract
- retained_cell_manifest
output_kind: module_reference
source_class: measured_result
claim_permissions:
- derived_module_definition
timeout_seconds: 3600
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    control_column:
      type: string
    control_values:
      type: array
      items:
        type: string
    h5ad_path:
      type: string
      description: Registered asset ID with role primary_dataset.
      x-pertura-asset-role: primary_dataset
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    ranks:
      type: array
      items:
        type: string
    seeds:
      type: array
      items:
        type: string
  required: []
  additionalProperties: false
  examples:
  - max_memory_gb: 4.0
implemented: true
metadata:
  deprecated: true
  compatibility_only: true
  dependency_policy:
    diagnostic.guide_assignment.v1:
      scope: exact
      usage: validation_gate
      accepted_statuses:
      - screen_passed
      - caution
