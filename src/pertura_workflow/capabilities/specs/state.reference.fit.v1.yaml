schema_version: pertura-capability-spec-v2
capability_id: state.reference.fit.v1
version: 0.1.0
phase: 3
kind: analysis
summary: Fit PCA, kNN and stable Leiden states on confirmed controls only.
trust_level: exploratory
executor: state_reference_fit
validator: candidate_standard
input_requirements:
- confirmed_controls
- retained_cells
depends_on:
- screen.retained_cells.v1
dependency_kinds:
- contract
- retained_cell_manifest
output_kind: state_reference_fit
source_class: measured_result
claim_permissions: []
timeout_seconds: 3600
parameters_schema:
  type: object
  properties:
    assignment_path:
      type: string
    chunk_rows:
      type: integer
    control_column:
      type: string
    control_values:
      type: array
      items:
        type:
        - string
        - number
        - integer
        - object
    h5ad_path:
      type: string
      x-pertura-asset-role: primary_dataset
      description: Registered asset ID with role primary_dataset.
    manual_labels:
      type: object
    mapping_probability_threshold:
      type: number
    marker_candidates:
      type: object
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    minimum_control_cells:
      type: integer
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    perturbation_labels_used:
      type: boolean
    reference_model_path:
      type: string
    resolutions:
      type: array
      items:
        type:
        - string
        - number
        - integer
        - object
    seeds:
      type: array
      items:
        type:
        - string
        - number
        - integer
        - object
    test_split_used:
      type: boolean
  additionalProperties: false
  examples:
  - {}
  required:
  - h5ad_path
  - control_column
  - control_values
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  environment_profile: perturbseq-python-v1
  execution_mode: isolated_python
