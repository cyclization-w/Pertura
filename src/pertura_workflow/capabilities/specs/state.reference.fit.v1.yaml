schema_version: pertura-capability-spec-v2
capability_id: state.reference.fit.v1
version: 0.1.0
phase: 3
kind: analysis
summary: Fit PCA, kNN and stable Leiden states on confirmed controls only.
trust_level: exploratory
executor: state_reference_fit
validator: candidate_standard
input_requirements:
- confirmed_controls
- retained_cells
depends_on:
- screen.retained_cells.v1
dependency_kinds:
- contract
- retained_cell_manifest
output_kind: state_reference_fit
source_class: measured_result
claim_permissions: []
timeout_seconds: 3600
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    control_column:
      type: string
    control_values:
      type: array
      items:
        type: string
    h5ad_path:
      type: string
      description: Registered asset ID with role primary_dataset.
      x-pertura-asset-role: primary_dataset
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    minimum_control_cells:
      type: integer
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    resolutions:
      type: array
      items:
        type: number
    seeds:
      type: array
      items:
        type: integer
  required:
  - h5ad_path
  - control_column
  - control_values
  additionalProperties: false
  examples:
  - h5ad_path: asset_example_primary_dataset
    control_column: example
    control_values:
    - example
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  environment_profile: perturbseq-python-v1
  execution_mode: isolated_python
  dependency_policy:
    screen.retained_cells.v1:
      scope: exact
      usage: row_filter
      accepted_statuses:
      - screen_passed
      - caution
