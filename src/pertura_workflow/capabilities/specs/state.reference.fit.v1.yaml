schema_version: pertura-capability-spec-v2
capability_id: state.reference.fit.v1
version: 0.1.0
phase: 3
kind: analysis
summary: Fit PCA, kNN and stable Leiden states on confirmed controls only.
trust_level: exploratory
executor: state_reference_fit
validator: candidate_standard
input_requirements:
- confirmed_controls
depends_on: []
dependency_kinds:
- contract
output_kind: state_reference_fit
source_class: measured_result
claim_permissions: []
timeout_seconds: 3600
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    control_column:
      type: string
    control_values:
      type: array
      items:
        type: string
    h5ad_path:
      type: string
      description: Registered asset ID with role primary_dataset.
      x-pertura-asset-role: primary_dataset
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    minimum_control_cells:
      type: integer
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    resolutions:
      type: array
      items:
        type: number
    selection_path:
      type: string
      description: Registered cell-selection asset limiting the fitted reference rows.
      x-pertura-asset-role: cell_selection
    seeds:
      type: array
      items:
        type: integer
  required:
  - h5ad_path
  - selection_path
  - control_column
  - control_values
  additionalProperties: false
  examples:
  - h5ad_path: asset_example_primary_dataset
    selection_path: asset_example_cell_selection
    control_column: example
    control_values:
    - example
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  environment_profile: python-science-v1
  execution_mode: isolated_python
  method_version: ref03-control-state-v1
