schema_version: pertura-capability-spec-v2
capability_id: design.next_panel.v1
version: 0.1.0
phase: 7
kind: analysis
summary: Rank next-panel hypotheses under explicit uncertainty, information, coverage,
  diversity, cost and feasibility weights.
trust_level: exploratory
executor: design_next_panel
validator: candidate_standard
input_requirements:
- virtual_evaluation
- candidate_panel
- budget
depends_on:
- virtual.evaluate.comprehensive.v1
dependency_kinds:
- virtual_evaluation
output_kind: next_panel_design
source_class: hypothesis
claim_permissions: []
timeout_seconds: 900
parameters_schema:
  type: object
  properties:
    budget:
      type: number
    candidates:
      type: array
      items:
        type:
        - string
        - number
        - integer
        - object
    chunk_rows:
      type: integer
      minimum: 1
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    weights:
      type: object
  required:
  - candidates
  - budget
  additionalProperties: false
  examples:
  - candidates:
    - example
    budget: 1.0
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  hypothesis_only: true
  dependency_policy:
    virtual.evaluate.comprehensive.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses:
      - supported
      - limited
