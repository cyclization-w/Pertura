schema_version: pertura-capability-spec-v2
capability_id: target.responder.mixscape.v1
version: 0.1.0
phase: 4
kind: diagnostic
summary: Classify responder and escape cells with Pertpy Mixscape.
trust_level: exploratory
executor: mixscape_responder
validator: candidate_standard
input_requirements:
- retained_cells
- state_reference
depends_on:
- screen.retained_cells.v1
- state.reference.map_knn.v1
dependency_kinds:
- contract
- retained_cell_manifest
- state_mapping
output_kind: mixscape_responder
source_class: measured_result
claim_permissions: []
timeout_seconds: 3600
parameters_schema:
  type: object
  properties:
    chunk_rows:
      type: integer
      minimum: 1
    control:
      type: string
    h5ad_path:
      type: string
      description: Registered asset ID with role primary_dataset.
      x-pertura-asset-role: primary_dataset
    iter_num:
      type: integer
    logfc_threshold:
      type: number
    max_memory_gb:
      type: number
      default: 4.0
      exclusiveMinimum: 0
    min_de_genes:
      type: integer
    n_dims:
      type: integer
    n_jobs:
      type: integer
      default: 1
      minimum: 1
    n_neighbors:
      type: integer
    new_class_name:
      type: string
    pert_key:
      type: string
    perturbation_type:
      type: string
      enum:
      - KO
      - KD
      - OE
    pval_cutoff:
      type: number
    ref_selection_mode:
      type: string
    scale:
      type: boolean
    split_by:
      type: string
    use_rep:
      type: string
  required:
  - h5ad_path
  - pert_key
  - control
  additionalProperties: false
  examples:
  - h5ad_path: asset_example_primary_dataset
    pert_key: example
    control: example
implemented: true
metadata:
  validation_status: synthetic_only
  candidate: true
  environment_profile: perturbseq-python-v1
  execution_mode: isolated_python
  method_version: pertpy-1.1.1
  dependency_policy:
    screen.retained_cells.v1:
      scope: exact
      usage: row_filter
      accepted_statuses:
      - screen_passed
      - caution
    state.reference.map_knn.v1:
      scope: exact
      usage: scientific_input
      accepted_statuses:
      - completed
      - completed_with_caution
