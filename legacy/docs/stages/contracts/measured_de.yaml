  "next_stage_recommendations": [
    "curated_enrichment",
    "module_effect",
    "claim_report"
  ],
  "benchmark_expectations": [
    "stage_completion",
    "artifact_registration_correct",
    "metadata_completeness",
    "stage_boundary_respected",
    "exploration_not_surfaced",
    "next_stage_recommendation_correct"
  ]
}
